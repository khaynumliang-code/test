<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mwe Sein - Interactive Book with Alien Sky</title>
    <style>
        /* 基础设置：移除了 overflow:hidden，让 body 处理 Canvas */
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #010107; /* 极深的宇宙黑蓝 */
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-user-select: none; 
            user-select: none; 
            touch-action: none; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* 移至此处，Canvas和Book共享空间感 */
            perspective: 2500px; 
        }

        /* 宇宙 Canvas 背景 */
        #skyCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50; /* 在所有内容之前，但在Book之后 */
            pointer-events: none; /* 不干扰书本互动 */
        }

        #book-container {
            position: relative;
            width: 90vw; 
            max-width: 600px; 
            height: 70vh;
            z-index: 100; /* 书在Canvas之前 */
            transform-style: preserve-3d;
        }

        .book { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }
        
        /* 螺旋环：优化了颜色，使其更具金属质感 */
        .spiral {
            position: absolute; top: -15px; left: 20px; width: calc(100% - 40px); height: 30px;
            display: flex; flex-direction: row; justify-content: space-around;
            z-index: 10; pointer-events: none; transform-style: preserve-3d;
        }
        .ring {
            width: 8px; height: 30px; background: linear-gradient(to right, #2a2a2a, #8f8f8f, #2a2a2a);
            border-radius: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 页面基础 */
        .page {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            transform-origin: top; transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: grab;
            will-change: transform;
        }
        
        .side {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 5px 5px 15px 15px; display: flex; align-items: center; justify-content: center; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05); /* 微弱的页边白线 */
        }

        /* 封面样式：增加了一些纹理和金属光泽 */
        .cover {
            background-color: #b3956e;
            background-image: 
                linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0) 5%, rgba(0,0,0,0) 95%, rgba(0,0,0,0.1) 100%),
                radial-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 100% 100%, 4px 4px;
            border-top: 10px solid rgba(0,0,0,0.15);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.2), 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .cover-title { text-align: center; color: #2a1f12; pointer-events: none; }
        .cover-title h1 { 
            font-size: 48px; 
            margin: 0; 
            font-family: "Georgia", serif; 
            font-weight: bold;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.3);
        }
        .cover-title p { letter-spacing: 5px; font-size: 14px; margin-top: 10px; font-weight: bold; opacity: 0.8; }

        /* 内页样式 */
        .page-inner { background-color: #fffef0; }
        .page-inner img { 
            width: 85%; height: 85%; object-fit: contain; 
            border: 8px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
            pointer-events: none;
        }
        
        .back { transform: rotateX(-180deg); }
        .book.flipped-active .ring { transform: rotateX(-160deg); }

        /* 提示语：加深阴影和颜色，适应暗色背景 */
        #click-hint {
            position: absolute; bottom: -80px; width: 100%; text-align: center; 
            color: #ffffff; font-size: 19px; font-weight: bold;
            text-shadow: 0 0 10px #42c8f5, 0 0 20px #42c8f5, 0 2px 5px rgba(0,0,0,0.8);
            animation: breatheHint 1.5s infinite; pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .final-wish h2 { font-size: 36px; color: #2a1f12; margin-bottom: 5px; }
        .final-wish p { font-size: 18px; color: #4a3b2a; }

        @keyframes breatheHint { 
            0%, 100% { opacity: 0.4; transform: scale(0.96); } 
            50% { opacity: 1; transform: scale(1.04); } 
        }
    </style>
</head>
<body>

<canvas id="skyCanvas"></canvas>

<div id="book-container">
    <div class="spiral">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="ring"></div>
    </div>

    <div class="book" id="main-book">
        <div class="page" id="p1" style="z-index: 5;">
            <div class="side cover">
                <div class="cover-title">
                    <h1>Mwe Sein</h1>
                    <p>MEMORIES</p>
                </div>
            </div>
            <div class="side back page-inner"><img src="mwe1.jpg" alt="1"></div>
        </div>

        <div class="page" id="p2" style="z-index: 4;">
            <div class="side page-inner"><img src="mwe2.jpg" alt="2"></div>
            <div class="side back page-inner"><img src="mwe3.jpg" alt="3"></div>
        </div>

        <div class="page" id="p3" style="z-index: 3;">
            <div class="side page-inner"><img src="mwe4.jpg" alt="4"></div>
            <div class="side back page-inner"><img src="mwe5.jpg" alt="5"></div>
        </div>

        <div class="page" id="p4" style="z-index: 2;">
            <div class="side page-inner"><img src="mwe6.jpg" alt="6"></div>
            <div class="side back cover" style="border: none;">
                <div class="final-wish" style="text-align:center;">
                    <h2>Happy Birthday</h2>
                    <p>To Mwe Sein</p>
                </div>
            </div>
        </div>
    </div>
    <div id="click-hint">✦ အပေါ်သို့ဆွဲတင်၍ ဖွင့်ပါ ✦</div>
</div>

<script>
/* === 新增：Canvas 宇宙天空绘图逻辑 === */
const canvas = document.getElementById('skyCanvas');
const ctx = canvas.getContext('2d');
let w, h, stars = [], nebulaGradient;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    initSky();
}

function initSky() {
    stars = [];
    // 生成 300 颗星星
    for (let i = 0; i < 300; i++) {
        stars.push({
            x: Math.random() * w,
            y: Math.random() * h,
            size: Math.random() * 1.5,
            // 呼吸效果的参数：速度、当前相位
            blinkSpeed: Math.random() * 0.02 + 0.005,
            blinkPhase: Math.random() * Math.PI * 2,
            baseAlpha: Math.random() * 0.5 + 0.3
        });
    }
}

// 用于绘制流畅星云（灵活感的核心）
let nebulaTime = 0;
function drawNebula() {
    nebulaTime += 0.001; // 控制星云颜色流动的速度

    // 创建一个径向渐变
    // 灵活感：渐变的中心点随时间缓慢漂移
    let driftX = w/2 + Math.sin(nebulaTime) * w/4;
    let driftY = h/2 + Math.cos(nebulaTime) * h/4;
    
    nebulaGradient = ctx.createRadialGradient(driftX, driftY, 10, w/2, h/2, w);
    
    // 外星天空的颜色组合：深蓝、深紫、淡洋红
    nebulaGradient.addColorStop(0, '#02031a'); // 核心
    nebulaGradient.addColorStop(0.4, '#150130'); // 紫色区域
    nebulaGradient.addColorStop(0.7, '#260421'); // 洋红渗透
    nebulaGradient.addColorStop(1, '#000000'); // 边缘

    ctx.fillStyle = nebulaGradient;
    ctx.fillRect(0, 0, w, h);
}

function drawStars() {
    ctx.fillStyle = 'white';
    stars.forEach(s => {
        // 计算呼吸闪烁的透明度
        let alpha = s.baseAlpha + Math.sin(nebulaTime + s.blinkPhase) * 0.3;
        ctx.globalAlpha = Math.max(0.1, alpha); // 确保不会完全消失
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1; // 重置透明度
}

function animateSky() {
    ctx.clearRect(0, 0, w, h);
    drawNebula();
    drawStars();
    requestAnimationFrame(animateSky);
}

// 启动宇宙
window.addEventListener('resize', resize);
resize();
requestAnimationFrame(animateSky);


/* === 保留：原有的书本互动逻辑 === */
const pages = document.querySelectorAll('.page');
let isDragging = false, startY = 0, currentTargetPage = null;

function initBook() {
    pages.forEach(page => {
        const originalZ = parseInt(window.getComputedStyle(page).zIndex);
        
        const startHandler = (e) => {
            isDragging = true;
            currentTargetPage = page;
            startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            page.style.transition = 'none';
        };

        const moveHandler = (e) => {
            if (!isDragging || currentTargetPage !== page) return;
            const currentY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            const diff = currentY - startY;
            
            if (!page.classList.contains('flipped')) {
                if (diff < 0) { // 向上拉
                    let angle = Math.max(-165, diff * 0.8);
                    page.style.transform = `rotateX(${-angle}deg)`;
                }
            } else {
                if (diff > 0) { // 向下拉回
                    let angle = Math.min(0, -165 + diff * 0.8);
                    page.style.transform = `rotateX(${-angle}deg)`;
                }
            }
        };

        const endHandler = (e) => {
            if (!isDragging || currentTargetPage !== page) return;
            isDragging = false;
            const endY = e.type.includes('touch') ? (e.changedTouches[0].clientY || startY) : e.clientY;
            const diff = endY - startY;
            
            page.style.transition = 'transform 0.6s cubic-bezier(0.2, 0, 0.2, 1)';
            
            const threshold = 30; 
            if (!page.classList.contains('flipped')) {
                if (diff < -threshold) { flipPage(page, originalZ, true); }
                else { resetPage(page, originalZ); }
            } else {
                if (diff > threshold) { flipPage(page, originalZ, false); }
                else { resetPage(page, originalZ); }
            }
            currentTargetPage = null;
        };

        page.addEventListener('mousedown', startHandler);
        page.addEventListener('touchstart', startHandler, {passive: true});
        window.addEventListener('mousemove', moveHandler);
        window.addEventListener('touchmove', moveHandler, {passive: false});
        window.addEventListener('mouseup', endHandler);
        window.addEventListener('touchend', endHandler);
    });
}

function resetPage(el, originalZ) {
    const isFlipped = el.classList.contains('flipped');
    el.style.transform = isFlipped ? 'rotateX(165deg)' : 'rotateX(0deg)';
    el.style.zIndex = isFlipped ? "0" : originalZ;
}

function flipPage(el, originalZ, shouldFlip) {
    const book = document.getElementById('main-book');
    const hint = document.getElementById('click-hint');

    if (shouldFlip) {
        el.classList.add('flipped');
        el.style.transform = 'rotateX(165deg)';
        
        // 關鍵改動：如果翻開的是封面(p1)，彻底隐藏提示语
        if(el.id === 'p1') {
            book.classList.add('flipped-active');
            if (hint) {
                hint.style.opacity = '0';
                setTimeout(() => { hint.style.display = 'none'; }, 500);
            }
        }
        
        setTimeout(() => { if(el.classList.contains('flipped')) el.style.zIndex = "0"; }, 300);
    } else {
        el.style.zIndex = originalZ;
        if(el.id === 'p1') book.classList.remove('flipped-active');
        el.classList.remove('flipped');
        el.style.transform = 'rotateX(0deg)';
    }
}

// 启动书本逻辑
initBook();
</script>
</body>
</html>
